<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistemas de Multas</h1>
    Velocidade do carro: <input type="number" name="txtvel" id="txtvel"> km/h
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="result"></div>
    <script>
        function calcular () {
            var velocidade = document.getElementById('txtvel').value
            var velocidade = Number(velocidade)
            var result = document.getElementById('result')
            if (velocidade > 100) {
                result.innerHTML += 'Você ultrapassou a velocidade permitida. MULTADO!'
            } else {
                result.innerHTML += 'Dirija sempre usando cinto de segurança!'
            }
        }
    </script>
</body>
</html>
